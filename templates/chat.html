<!DOCTYPE html>
<html>
<head>
    <title>Chatbot</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.5.0/css/all.css">

    <!-- jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css')}}"/>
</head>

<body>

<!-- BACKGROUND DECORATIVE GLOWS -->
<div class="bg-glow-1"></div>
<div class="bg-glow-2"></div>

<div class="container-fluid h-100 d-flex flex-column align-items-center justify-content-center py-3">
    <!-- APP HEADER OUTSIDE THE CHAT BOX -->
    <div class="text-center app-header">
        <h1 class="text-gradient">MedBot AI</h1>
        <p>Your Intelligent Medical & Health Companion</p>
    </div>

    <div class="row justify-content-center w-100">		
        <div class="col-md-8 col-xl-5 chat">
            <div class="card">

                <!-- HEADER -->
                <div class="card-header msg_head">
                    <div class="d-flex bd-highlight">
                        <div class="img_cont">
                            <img src="{{ url_for('static', filename='doctor_avatar.png') }}" class="rounded-circle user_img">
                            <span class="online_icon"></span>
                        </div>
                        <div class="user_info">
                            <span>Medical Chatbot</span>
                            <p>Ask me anything!</p>
                        </div>
                    </div>
                </div>

                <!-- CHAT BODY -->
                <div id="messageFormeight" class="card-body msg_card_body">
                    <!-- Welcome screen empty state -->
                    <div class="welcome-container">
                        <div class="welcome-icon-wrapper">
                            <i class="fas fa-user-md welcome-icon"></i>
                        </div>
                        <h3>Welcome to MedBot AI</h3>
                        <p class="welcome-text">Ask medical questions, check symptoms, or learn about health conditions. All responses are powered by verified clinical reference manuals.</p>
                        <div class="suggested-queries">
                            <button class="suggested-btn" onclick="fillQuery('What are the common symptoms of Migraine?')">
                                <i class="fas fa-stethoscope"></i> Migraine symptoms & warnings
                            </button>
                            <button class="suggested-btn" onclick="fillQuery('How is Type 2 Diabetes diagnosed?')">
                                <i class="fas fa-heartbeat"></i> Type 2 Diabetes diagnosis
                            </button>
                            <button class="suggested-btn" onclick="fillQuery('Explain the prevention of cardiovascular disease.')">
                                <i class="fas fa-shield-alt"></i> Heart disease prevention tips
                            </button>
                        </div>
                    </div>
                </div>

                <!-- FOOTER -->
                <div class="card-footer">
                    <div class="input-group">
                        <input type="text" id="text" placeholder="Type your message..." class="form-control type_msg" autocomplete="off">

                        <div class="input-group-append">
                            <button id="send" class="input-group-text send_btn">
                                <i class="fas fa-location-arrow"></i>
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<!-- ✅ SINGLE CLEAN SCRIPT -->
<script>
// Global function to auto-fill and submit queries
function fillQuery(text) {
    $("#text").val(text);
    $("#send").click();
}

$(document).ready(function () {

    function scrollToBottom() {
        let objDiv = document.getElementById("messageFormeight");
        objDiv.scrollTop = objDiv.scrollHeight;
    }

    function sendMessage() {
        let rawText = $("#text").val().trim();

        // 🚫 prevent empty message
        if (rawText === "") return;

        const date = new Date();
        const str_time = date.getHours() + ":" + date.getMinutes();

        // USER MESSAGE
        let userHtml = `
        <div class="d-flex justify-content-end mb-4">
            <div class="msg_cotainer_send">
                ${rawText}
                <span class="msg_time_send">${str_time}</span>
            </div>
        </div>`;

        $("#text").val("");
        
        // Remove welcome screen on first message if present
        $(".welcome-container").fadeOut(250, function() {
            $(this).remove();
        });

        $("#messageFormeight").append(userHtml);
        scrollToBottom();

        // AJAX CALL
        $.ajax({
            data: { msg: rawText },
            type: "POST",
            url: "/get",
        }).done(function (data) {

            if (!data) return;

            let botHtml = `
            <div class="d-flex justify-content-start mb-4">
                <div class="msg_cotainer">
                    ${data}
                    <span class="msg_time">${str_time}</span>
                </div>
            </div>`;

            $("#messageFormeight").append(botHtml);
            scrollToBottom();
        });
    }

    // BUTTON CLICK
    $("#send").click(function () {
        sendMessage();
    });

    // ENTER KEY
    $("#text").keypress(function (e) {
        if (e.which === 13) {
            sendMessage();
            return false;
        }
    });

});
</script>

</body>
</html>
